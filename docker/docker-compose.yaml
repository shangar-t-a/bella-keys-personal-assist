name: bella-keys-personal-assist

# Profiles:
#   (none)    — postgres + expense-manager-service (always on)
#   bella     — bella-chat-service + qdrant + phoenix (tracing)
#   web       — UI with full nginx config (bella-chat + EMS proxied)
#   ems-web   — UI with EMS-only nginx config

services:
  postgres:
    image: postgres:latest
    container_name: postgres-database
    environment:
      - POSTGRES_USER=${EMS_PG_DB_USER}
      - POSTGRES_PASSWORD=${EMS_PG_DB_PASSWORD}
      - POSTGRES_DB=${EMS_PG_DB_NAME}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bella-keys-network

  expense-manager-service:
    build: ../services/expense-manager-service
    container_name: expense-manager-service
    ports:
      - "8000:8000"
    environment:
      # App configurations
      - HOST=${EMS_HOST}
      - PORT=${EMS_PORT}
      - DEBUG=${EMS_DEBUG}
      # Database configurations
      - STORAGE_TYPE=${EMS_STORAGE_TYPE}
      - DATABASE_URL=${EMS_DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bella-keys-network

  bella-chat-service:
    profiles: [bella]
    build: ../services/bella-chat-service
    container_name: bella-chat-service
    ports:
      - "5000:5000"
    environment:
      # Bella Service Settings
      - HOST=${BCS_HOST}
      - PORT=${BCS_PORT}
      - DEBUG=${BCS_DEBUG}
      # AI Settings
      - SYNTHESIS_MODEL_PROVIDER=${SYNTHESIS_MODEL_PROVIDER}
      - SYNTHESIS_MODEL_NAME=${SYNTHESIS_MODEL_NAME}
      - SYNTHESIS_MODEL_CTX_LENGTH=${SYNTHESIS_MODEL_CTX_LENGTH}
      - EMBEDDING_MODEL_PROVIDER=${EMBEDDING_MODEL_PROVIDER}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME}
      - EMBEDDING_MODEL_DIMENSION=${EMBEDDING_MODEL_DIMENSION}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      # Ollama Settings
      - OLLAMA_URL=${OLLAMA_URL}
      # QDRANT Settings
      - QDRANT_URL=${QDRANT_URL}
      # Keys Personal Wiki Agent Settings
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME}
      # Arize Settings
      - ARIZE_ENABLED=${ARIZE_ENABLED}
      - ARIZE_TRACES_URL=${ARIZE_TRACES_URL}
      - ARIZE_PROJECT_NAME=${ARIZE_PROJECT_NAME}
    depends_on:
      - qdrant
    networks:
      - bella-keys-network

  qdrant:
    profiles: [bella]
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC API
    volumes:
      - ../services/.db/qdrant/storage:/qdrant/storage
    networks:
      - bella-keys-network

  phoenix:
    profiles: [bella]
    image: arizephoenix/phoenix:latest
    container_name: phoenix
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - 6006:6006 # PHOENIX_PORT
      - 4317:4317 # PHOENIX_GRPC_PORT
      - 9090:9090 # [Optional] PROMETHEUS PORT IF ENABLED
    environment:
      - PHOENIX_SQL_DATABASE_URL=postgresql://${ARIZE_PG_DB_USER}:${ARIZE_PG_DB_PASSWORD}@${ARIZE_PG_DB_HOST}:5432/${ARIZE_PG_DB_NAME}
    networks:
      - bella-keys-network

  # Full UI: proxies both /api/ems and /api/bella-chat
  keys-personal-assist-ui:
    profiles: [web]
    build: ../keys-personal-assist-ui
    container_name: keys-personal-assist-ui
    ports:
      - "3000:80"
    depends_on:
      - expense-manager-service
      - bella-chat-service
    networks:
      - bella-keys-network

  # EMS-only UI: proxies /api/ems only (no bella-chat block)
  keys-personal-assist-ems-ui:
    profiles: [ems-web]
    build: ../keys-personal-assist-ui
    container_name: keys-personal-assist-ems-ui
    ports:
      - "3000:80"
    volumes:
      - ../keys-personal-assist-ui/nginx.ems.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - expense-manager-service
    networks:
      - bella-keys-network

networks:
  bella-keys-network:
    driver: bridge
