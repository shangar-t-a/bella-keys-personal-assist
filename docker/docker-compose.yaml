name: bella-apps-dev

# Profiles:
#   (none)    — postgres + ems-dev (always on)
#   bella     — bella-chat-dev + qdrant-dev + phoenix-dev (tracing)
#   web       — UI with full nginx config (bella-chat-dev + ems-dev proxied)
#   ems-web   — UI with ems-dev-only nginx config

services:

  ems-dev:
    build: ../services/expense-manager-service
    container_name: ems-dev
    ports:
      - "8000:8000"
    environment:
      # App configurations
      - HOST=${EMS_HOST}
      - PORT=${EMS_PORT}
      - DEBUG=${EMS_DEBUG}
      # Database configurations
      - STORAGE_TYPE=${EMS_STORAGE_TYPE}
      - DATABASE_URL=${EMS_PG_DATABASE_URL}
      - PG_DB_HOST=${EMS_PG_DB_HOST:-host.docker.internal}
    networks:
      - bella-network-dev
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  bella-chat-dev:
    profiles: [bella]
    build: ../services/bella-chat-service
    container_name: bella-chat-dev
    ports:
      - "5000:5000"
    environment:
      # Bella Service Settings
      - HOST=${BCS_HOST}
      - PORT=${BCS_PORT}
      - DEBUG=${BCS_DEBUG}
      # AI Settings
      - SYNTHESIS_MODEL_PROVIDER=${SYNTHESIS_MODEL_PROVIDER}
      - SYNTHESIS_MODEL_NAME=${SYNTHESIS_MODEL_NAME}
      - SYNTHESIS_MODEL_CTX_LENGTH=${SYNTHESIS_MODEL_CTX_LENGTH}
      - EMBEDDING_MODEL_PROVIDER=${EMBEDDING_MODEL_PROVIDER}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME}
      - EMBEDDING_MODEL_DIMENSION=${EMBEDDING_MODEL_DIMENSION}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      # Ollama Settings
      - OLLAMA_URL=${OLLAMA_URL}
      # QDRANT Settings
      - QDRANT_URL=${QDRANT_URL:-http://host.docker.internal:6333}
      # Keys Personal Wiki Agent Settings
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME}
      # EMS MCP Server Settings
      - EMS_MCP_SERVER_URL=http://ems-mcp-dev:8001/mcp
      # Arize Settings
      - ARIZE_ENABLED=${ARIZE_ENABLED}
      - ARIZE_TRACES_URL=${ARIZE_TRACES_URL}
      - ARIZE_PROJECT_NAME=${ARIZE_PROJECT_NAME}
      - ARIZE_PG_DB_USER=${ARIZE_PG_DB_USER}
      - ARIZE_PG_DB_PASSWORD=${ARIZE_PG_DB_PASSWORD}
      - ARIZE_PG_DB_HOST=${ARIZE_PG_DB_HOST:-host.docker.internal}
      - ARIZE_PG_DB_NAME=${ARIZE_PG_DB_NAME}
      # LangGraph Postgres Checkpointer
      - LANGGRAPH_PG_DB_USER=${LANGGRAPH_PG_DB_USER}
      - LANGGRAPH_PG_DB_PASSWORD=${LANGGRAPH_PG_DB_PASSWORD}
      - LANGGRAPH_PG_DB_HOST=${LANGGRAPH_PG_DB_HOST:-host.docker.internal}
      - LANGGRAPH_PG_DB_NAME=${LANGGRAPH_PG_DB_NAME}
      - ORCHESTRATOR_MAX_ITERATIONS=${ORCHESTRATOR_MAX_ITERATIONS}
    depends_on:
      qdrant-dev:
        condition: service_started
      ems-mcp-dev:
        condition: service_started
    networks:
      - bella-network-dev
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ems-mcp-dev:
    profiles: [bella]
    build: ../mcps/ems-mcp-server
    container_name: ems-mcp-dev
    ports:
      - "8001:8001"
    environment:
      - EMS_BASE_URL=http://ems-dev:8000
      - HOST=0.0.0.0
      - PORT=8001
    depends_on:
      - ems-dev
    networks:
      - bella-network-dev
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  qdrant-dev:
    profiles: [bella]
    image: qdrant/qdrant:latest
    container_name: qdrant-dev
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC API
    volumes:
      - ../services/.db/qdrant/storage:/qdrant/storage
    networks:
      - bella-network-dev
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  phoenix-dev:
    profiles: [bella]
    image: arizephoenix/phoenix:latest
    container_name: phoenix-dev
    ports:
      - 6006:6006 # PHOENIX_PORT
      - 4317:4317 # PHOENIX_GRPC_PORT
      - 9090:9090 # [Optional] PROMETHEUS PORT IF ENABLED
    environment:
      - PHOENIX_SQL_DATABASE_URL=postgresql://${ARIZE_PG_DB_USER}:${ARIZE_PG_DB_PASSWORD}@${ARIZE_PG_DB_HOST:-host.docker.internal}:5432/${ARIZE_PG_DB_NAME}
    networks:
      - bella-network-dev
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Full UI: proxies both /api/ems and /api/bella-chat
  keys-ui-dev:
    profiles: [web]
    build: ../keys-personal-assist-ui
    container_name: keys-ui-dev
    ports:
      - "3000:80"
    depends_on:
      - ems-dev
      - bella-chat-dev
    networks:
      - bella-network-dev
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # EMS-only UI: proxies /api/ems only (no bella-chat block)
  keys-ui-ems-dev:
    profiles: [ems-web]
    build: ../keys-personal-assist-ui
    container_name: keys-ui-ems-dev
    ports:
      - "3000:80"
    volumes:
      - ../keys-personal-assist-ui/nginx.ems.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ems-dev
    networks:
      - bella-network-dev
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  bella-network-dev:
    driver: bridge
