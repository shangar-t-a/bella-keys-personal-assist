name: bella-apps

# Profiles:
#   (none)      — auth-service + ems (always on)
#   ai-chat     — bella-chat + ems-mcp + qdrant
#   monitor     — phoenix / arize observability
#   ui          — full nginx UI (proxies EMS + bella-chat)
#   ui-ems      — EMS-only nginx UI

services:

  auth-service:
    image: ${REGISTRY:-ghcr.io}/${REPO_OWNER:-shangar-t-a}/auth-service:latest
    container_name: auth-service
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=${AUTH_PG_DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PG_DB_HOST=${AUTH_PG_DB_HOST:-host.docker.internal}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - bella-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ems:
    image: ${REGISTRY:-ghcr.io}/${REPO_OWNER:-shangar-t-a}/expense-manager-service:latest
    container_name: ems
    ports:
      - "8000:8000"
    environment:
      # App configurations
      - HOST=${EMS_HOST}
      - PORT=${EMS_PORT}
      - DEBUG=${EMS_DEBUG}
      - JWT_SECRET=${JWT_SECRET}
      # Database configurations
      - STORAGE_TYPE=${EMS_STORAGE_TYPE}
      - DATABASE_URL=${EMS_PG_DATABASE_URL}
      - PG_DB_HOST=${EMS_PG_DB_HOST:-host.docker.internal}
    depends_on:
      auth-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - bella-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  bella-chat:
    profiles: [ai-chat]
    image: ${REGISTRY:-ghcr.io}/${REPO_OWNER:-shangar-t-a}/bella-chat-service:latest
    container_name: bella-chat
    ports:
      - "5000:5000"
    environment:
      # Bella Service Settings
      - HOST=${BCS_HOST}
      - PORT=${BCS_PORT}
      - DEBUG=${BCS_DEBUG}
      - JWT_SECRET=${JWT_SECRET}
      # AI Settings
      - SYNTHESIS_MODEL_PROVIDER=${SYNTHESIS_MODEL_PROVIDER}
      - SYNTHESIS_MODEL_NAME=${SYNTHESIS_MODEL_NAME}
      - SYNTHESIS_MODEL_CTX_LENGTH=${SYNTHESIS_MODEL_CTX_LENGTH}
      - EMBEDDING_MODEL_PROVIDER=${EMBEDDING_MODEL_PROVIDER}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME}
      - EMBEDDING_MODEL_DIMENSION=${EMBEDDING_MODEL_DIMENSION}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      # Ollama Settings
      - OLLAMA_URL=${OLLAMA_URL}
      # QDRANT Settings
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      # Keys Personal Wiki Agent Settings
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME}
      # EMS MCP Server Settings
      - EMS_MCP_SERVER_URL=http://ems-mcp:8001/mcp
      # Arize Settings
      - ARIZE_ENABLED=${ARIZE_ENABLED}
      - ARIZE_TRACES_URL=${ARIZE_TRACES_URL}
      - ARIZE_PROJECT_NAME=${ARIZE_PROJECT_NAME}
      - ARIZE_PG_DB_USER=${ARIZE_PG_DB_USER}
      - ARIZE_PG_DB_PASSWORD=${ARIZE_PG_DB_PASSWORD}
      - ARIZE_PG_DB_HOST=${ARIZE_PG_DB_HOST:-host.docker.internal}
      - ARIZE_PG_DB_NAME=${ARIZE_PG_DB_NAME}
      # LangGraph Postgres Checkpointer
      - LANGGRAPH_PG_DB_USER=${LANGGRAPH_PG_DB_USER}
      - LANGGRAPH_PG_DB_PASSWORD=${LANGGRAPH_PG_DB_PASSWORD}
      - LANGGRAPH_PG_DB_HOST=${LANGGRAPH_PG_DB_HOST:-host.docker.internal}
      - LANGGRAPH_PG_DB_NAME=${LANGGRAPH_PG_DB_NAME}
      - ORCHESTRATOR_MAX_ITERATIONS=${ORCHESTRATOR_MAX_ITERATIONS}
    depends_on:
      qdrant:
        condition: service_healthy
      ems-mcp:
        condition: service_healthy
      auth-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - bella-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ems-mcp:
    profiles: [ai-chat]
    image: ${REGISTRY:-ghcr.io}/${REPO_OWNER:-shangar-t-a}/ems-mcp-server:latest
    container_name: ems-mcp
    ports:
      - "8001:8001"
    environment:
      - EMS_BASE_URL=http://ems:8000
      - AUTH_SERVICE_URL=http://auth-service:8002
      - HOST=0.0.0.0
      - PORT=8001
    depends_on:
      ems:
        condition: service_healthy
      auth-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/127.0.0.1/8001"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - bella-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  qdrant:
    profiles: [ai-chat]
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC API
    volumes:
      - ../services/.db/qdrant/storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/127.0.0.1/6333"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - bella-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  phoenix:
    profiles: [monitor]
    image: arizephoenix/phoenix:latest
    container_name: phoenix
    ports:
      - 6006:6006 # PHOENIX_PORT
      - 4317:4317 # PHOENIX_GRPC_PORT
      - 9090:9090 # [Optional] PROMETHEUS PORT IF ENABLED
    environment:
      - PHOENIX_SQL_DATABASE_URL=postgresql://${ARIZE_PG_DB_USER}:${ARIZE_PG_DB_PASSWORD}@${ARIZE_PG_DB_HOST:-host.docker.internal}:5432/${ARIZE_PG_DB_NAME}
    networks:
      - bella-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Full UI: proxies both /api/ems and /api/bella-chat
  keys-ui:
    profiles: [ui]
    image: ${REGISTRY:-ghcr.io}/${REPO_OWNER:-shangar-t-a}/keys-personal-assist-ui:latest
    container_name: keys-ui
    ports:
      - "3000:80"
    depends_on:
      - ems
      - bella-chat
    networks:
      - bella-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # EMS-only UI: proxies /api/ems only (no bella-chat block)
  keys-ui-ems:
    profiles: [ui-ems]
    image: ${REGISTRY:-ghcr.io}/${REPO_OWNER:-shangar-t-a}/keys-personal-assist-ui:latest
    container_name: keys-ui-ems
    ports:
      - "3000:80"
    volumes:
      - ../keys-personal-assist-ui/nginx.ems.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ems
    networks:
      - bella-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  bella-network:
    driver: bridge
