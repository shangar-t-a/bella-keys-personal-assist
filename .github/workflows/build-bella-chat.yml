name: Build Bella Chat Service

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag (leave empty to use VERSION file)'
        required: false
        type: string
  push:
    paths:
      - 'services/bella-chat-service/VERSION'

env:
  REGISTRY: ghcr.io
  REPO_OWNER: ${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(cat services/bella-chat-service/VERSION)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: ./.github/workflows/reusable-docker-build.yml
        with:
          service_path: ./services/bella-chat-service
          image_name: bella-chat-service
          tag: ${{ steps.version.outputs.version }}
