name: Build Bella Chat Service

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag (leave empty to use VERSION file)"
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - "services/bella-chat-service/VERSION"

env:
  REGISTRY: ghcr.io
  REPO_OWNER: ${{ github.repository_owner }}

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Read VERSION file
        id: version
        run: |
          VERSION=$(cat services/bella-chat-service/VERSION)
          echo "📦 Building version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build:
    needs: get-version
    uses: ./.github/workflows/reusable-docker-build.yml
    permissions:
      contents: read
      packages: write
    with:
      service_path: ./services/bella-chat-service
      image_name: bella-chat-service
      tag: ${{ inputs.version != '' && inputs.version || needs.get-version.outputs.version }}
