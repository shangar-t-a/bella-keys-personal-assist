name: Build Bella Chat Service

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag (leave empty to use VERSION file)"
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - "services/bella-chat-service/VERSION"

env:
  REGISTRY: ghcr.io
  REPO_OWNER: ${{ github.repository_owner }}

jobs:
  build:
    uses: ./.github/workflows/reusable-docker-build.yml
    permissions:
      contents: read
      packages: write
    with:
      service_path: ./services/bella-chat-service
      image_name: bella-chat-service
      tag: ${{ inputs.version != '' && inputs.version || format('{0}', github.sha) }}
