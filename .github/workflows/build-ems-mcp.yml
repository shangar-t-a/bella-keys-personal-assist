name: Build EMS MCP Server

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag (leave empty to use VERSION file)"
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - "mcps/ems-mcp-server/VERSION"

jobs:
  build:
    uses: ./.github/workflows/reusable-docker-build.yml
    permissions:
      contents: read
      packages: write
      security-events: write
    with:
      service_path: ./mcps/ems-mcp-server
      image_name: ems-mcp-server
      tag: ${{ inputs.version }}
      push: ${{ github.event_name != 'pull_request' }}
      image_description: "EMS MCP Server - Model Context Protocol server for expense management"
