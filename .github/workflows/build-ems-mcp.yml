name: Build EMS MCP Server

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag (leave empty to use VERSION file)"
        required: false
        type: string
  push:
    paths:
      - "mcps/ems-mcp-server/VERSION"

env:
  REGISTRY: ghcr.io
  REPO_OWNER: ${{ github.repository_owner }}

jobs:
  build:
    uses: ./.github/workflows/reusable-docker-build.yml
    permissions:
      contents: read
      packages: write
    with:
      service_path: ./mcps/ems-mcp-server
      image_name: ems-mcp-server
      tag: ${{ inputs.version != '' && inputs.version || format('{0}', github.sha) }}
