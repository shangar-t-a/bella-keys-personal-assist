name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      service_path:
        description: "Path to service directory"
        required: true
        type: string
      image_name:
        description: "Docker image name"
        required: true
        type: string
      tag:
        description: "Image tag"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  REPO_OWNER: ${{ github.repository_owner }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Authentication uses the automatically provided GITHUB_TOKEN.

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.service_path }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/${{ inputs.image_name }}:${{ inputs.tag }}
            ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/${{ inputs.image_name }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
