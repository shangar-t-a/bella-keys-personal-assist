name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      service_path:
        description: "Path to service directory"
        required: true
        type: string
      image_name:
        description: "Docker image name"
        required: true
        type: string
      tag:
        description: "Image tag (optional, will read VERSION file if not provided)"
        required: false
        type: string
      push:
        description: "Push image to registry"
        required: false
        type: boolean
        default: true
      image_description:
        description: "Image description for OCI labels"
        required: false
        type: string
        default: ""

env:
  REGISTRY: ghcr.io
  REPO_OWNER: ${{ github.repository_owner }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Authentication uses the automatically provided GITHUB_TOKEN.

concurrency:
  group: docker-${{ github.ref }}-${{ inputs.image_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Print workflow inputs
        run: |
          echo "📋 Workflow Inputs:"
          echo "  service_path: ${{ inputs.service_path }}"
          echo "  image_name: ${{ inputs.image_name }}"
          echo "  tag: ${{ inputs.tag || '(will resolve from VERSION or SHA)' }}"
          echo "  push: ${{ inputs.push }}"
          echo "  image_description: ${{ inputs.image_description }}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve Docker Tag
        id: resolve-tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
            echo "🔖 Using provided tag: $TAG"
          elif [ -f "${{ inputs.service_path }}/VERSION" ]; then
            TAG=$(cat ${{ inputs.service_path }}/VERSION)
            echo "🔖 Using VERSION file: $TAG"
          else
            TAG="${{ github.sha }}"
            echo "🔖 Using git SHA: $TAG"
          fi
          echo "resolved_tag=$TAG" >> $GITHUB_OUTPUT
          echo "📤 Image: ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/${{ inputs.image_name }}:$TAG"
          echo "💾 Cache scope: ${{ inputs.image_name }}"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/${{ inputs.image_name }}
          tags: |
            type=raw,value=${{ steps.resolve-tag.outputs.resolved_tag }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && inputs.push }}
          labels: |
            org.opencontainers.image.title=${{ inputs.image_name }}
            org.opencontainers.image.description=${{ inputs.image_description != '' && inputs.image_description || inputs.image_name }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.licenses=MIT

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.service_path }}
          push: ${{ inputs.push }}
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ inputs.image_name }}
          cache-to: type=gha,mode=max,scope=${{ inputs.image_name }}

      - name: Run Trivy vulnerability scanner
        if: ${{ inputs.push }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/${{ inputs.image_name }}:${{ steps.resolve-tag.outputs.resolved_tag }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy scan results
        if: ${{ inputs.push }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results.sarif"

      - name: Print build outputs
        run: |
          echo "✅ Build Complete"
          echo "📦 Image: ${{ steps.meta.outputs.tags }}"
          echo "🔐 Digest: ${{ steps.build.outputs.digest }}"
          echo "🏷️  Labels:"
          echo "${{ steps.meta.outputs.labels }}" | while read line; do echo "  $line"; done
