name: Build Keys Personal Assist UI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag (leave empty to use VERSION file)"
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - "keys-personal-assist-ui/VERSION"

jobs:
  build:
    uses: ./.github/workflows/reusable-docker-build.yml
    permissions:
      contents: read
      packages: write
      security-events: write
    with:
      service_path: ./keys-personal-assist-ui
      image_name: keys-personal-assist-ui
      tag: ${{ inputs.version }}
      push: ${{ github.event_name != 'pull_request' }}
      image_description: "Keys Personal Assist UI"
